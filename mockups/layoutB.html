<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Controle - Layout B</title>
<style>
  :root{--accent:#00A896;--card:#F6F9F8;--text:#0F1724;--muted:#9CA3AF}
  *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:#fff;color:var(--text);padding:16px}
  .wrap{display:flex;flex-direction:column;min-height:100vh}
  .top{flex:0 0 46%;display:flex;align-items:flex-end;justify-content:center;padding-bottom:16px}
  .button-row{display:flex;width:100%;max-width:640px;gap:12px;justify-content:space-between}
  .button{flex:1;min-height:60px;background:var(--card);border:1px solid transparent;border-radius:16px;color:var(--text);font-weight:600;font-size:16px;display:flex;align-items:center;justify-content:center;gap:10px;padding:0 14px;transition:transform .14s,background .14s,border-color .14s;}
  .button:hover{transform:translateY(-1px)}
  .button.selected{background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 10px 26px rgba(0,168,150,.12)}
  .button .icon{font-size:20px}
  .bottom{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .temp{font-size:68px;font-weight:800;letter-spacing:-1px}
  .sub{color:var(--muted);margin-top:6px;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="button-row">
      <button class="button" id="c-frio" aria-pressed="false"><span class="icon">🌡️</span><span>Frio</span></button>
      <button class="button selected" id="c-super" aria-pressed="true"><span class="icon">❄️</span><span>Super Frio</span></button>
      <button class="button" id="c-mega" aria-pressed="false"><span class="icon">🧊</span><span>Megafrio</span></button>
    </div>
  </div>
  <div class="bottom">
    <div class="temp" id="t">5.0 °C</div>
    <div class="sub" id="sub">Alvo: 5.0 °C</div>
  </div>
</div>

<script>
  const superTemp = 5.0;
  const vals = {frio: superTemp+1.5, super: superTemp, mega: superTemp-1.5};
  const elT = document.getElementById('t');
  const elSub = document.getElementById('sub');
  const cards = {
    frio: document.getElementById('c-frio'),
    super: document.getElementById('c-super'),
    mega: document.getElementById('c-mega')
  };
  function pick(k){
    Object.values(cards).forEach(c=>{c.classList.remove('selected'); c.setAttribute('aria-pressed','false')});
    cards[k].classList.add('selected'); cards[k].setAttribute('aria-pressed','true');
    elT.textContent = vals[k].toFixed(1)+' °C';
    elSub.textContent = 'Alvo: '+vals[k].toFixed(1)+' °C';
  }
  cards.frio.addEventListener('click',()=>pick('frio'));
  cards.super.addEventListener('click',()=>pick('super'));
  cards.mega.addEventListener('click',()=>pick('mega'));
  pick('super');
</script>
</body>
</html>
